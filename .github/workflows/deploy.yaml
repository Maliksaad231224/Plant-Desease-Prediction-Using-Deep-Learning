name: Deploy to Oracle VPS (Self-Hosted Runner)

on:
  push:
    branches:
      - main   # or master if you use that

jobs:
  deploy:
    # IMPORTANT: use self-hosted runner (your VPS)
    runs-on: self-hosted

    steps:
      # 1. Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Deploy directly on VPS (no SSH needed)
      - name: Deploy Application
        run: |
          set -e

          echo "🚀 Starting deployment on VPS..."

          # If repo already exists, update it; otherwise clone
          
          cd ~/Plant-Desease-Prediction-Using-Deep-Learning
          git pull origin master
          cd backend
          docker build -t plant-backend .

          echo "🧹 Restart backend container..."
          docker stop plant-backend || true
          docker rm plant-backend || true
          docker run -d -p 8000:8000 --name plant-backend plant-backend
          
          echo "🐳 Rebuilding frontend..."
          cd frontend
          docker build -t plant-frontend .

          echo "🧹 Restart frontend container..."
          docker stop plant-frontend || true
          docker rm plant-frontend || true
          docker run -d -p 3000:3000 --name plant-frontend plant-frontend

          echo "✅ Deployment completed successfully!"